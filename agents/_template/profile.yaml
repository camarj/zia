# Identidad y autoridad del agente.
# IMPORTANTE: nunca pongas secretos aquí. Usa siempre referencias `*_env: VAR_NAME`
# y exporta los secretos como variables de entorno al arrancar el container.

agent:
  id: "REPLACE-WITH-SLUG-001"
  name: "REPLACE WITH DISPLAY NAME"
  email: "REPLACE@example.com"
  email_server:
    imap: mail.example.com:993
    smtp: mail.example.com:465
    credentials_env: AGENT_EMAIL_PASS

bosses:
  - email: "REPLACE-BOSS@example.com"
    permissions: [ approve_all, edit_ficha, view_audit, switch_model ]

accounts:
  slack:
    workspace: inteliside
    bot_token_env: AGENT_SLACK_TOKEN
  linear:
    team: REPLACE
    api_key_env: AGENT_LINEAR_KEY
  github:
    user: REPLACE-bot
    token_env: AGENT_GITHUB_TOKEN

# Lista de modelos disponibles. El primero (`default`) es el activo al arrancar.
# El jefe humano puede cambiarlo en runtime vía Web UI, TUI (Ctrl+P), o RPC set_model.
llm:
  # Phase 0 reads provider, model, and thinkingLevel from llm.default.
  # credentials_env is optional — defaults to the standard env name per provider
  # (ANTHROPIC_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, ...). The full catalog +
  # interactive CLI picker lands with sdd/llm-provider-cli.
  #
  # cacheRetention (F-CORE-7) — Anthropic prompt-cache TTL for the stable ficha
  # prefix. "short" (5 min, pi.dev default) | "long" (1 hour). Anthropic-only;
  # a no-op for other providers. Uncomment to extend the TTL for an always-on agent.
  # cacheRetention: short
  default:
    provider: opencode-go
    model: kimi-k2.6
    thinkingLevel: medium
  available:
    - provider: anthropic
      model: claude-opus-4-7
      thinkingLevel: high
      label: "Opus (razonamiento profundo)"
      credentials_env: ANTHROPIC_API_KEY
    - provider: anthropic
      model: claude-sonnet-4-6
      thinkingLevel: medium
      label: "Sonnet (default, balance)"
      credentials_env: ANTHROPIC_API_KEY
    - provider: anthropic
      model: claude-haiku-4-5-20251001
      thinkingLevel: off
      label: "Haiku (rápido y barato)"
      credentials_env: ANTHROPIC_API_KEY
    - provider: openai
      model: gpt-4o
      label: "GPT-4o (fallback no-Anthropic)"
      credentials_env: OPENAI_API_KEY
    # Custom OpenAI-compatible endpoint (Ollama, vLLM, LiteLLM, …).
    # `provider: custom` + `baseUrl` is what the resolver looks for. The CLI
    # `zia model` picker writes this shape automatically after validating the
    # endpoint with GET ${baseUrl}/v1/models.
    - provider: custom
      model: llama3.1:70b
      label: "Llama local (sin costo)"
      baseUrl: http://localhost:11434/v1
  monthly_budget_usd: 50
  fallback_on_error: true

# Long-term memory backend for this agent (F-CORE-5).
# Default is `file` (MEMORY.md, human-readable, git-versionable). Uncomment and
# set `provider: sqlite` to use the searchable FTS5 store in the agent's SQLite DB.
# memory:
#   provider: file   # file | sqlite
